<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Volleyball Tournaments">
  <!-- Background: charcoal rounded square (matches app --ink) -->
  <rect width="1024" height="1024" rx="232" ry="232" fill="#111111"/>

  <!-- Subtle inner ring for icon depth -->
  <rect x="6" y="6" width="1012" height="1012" rx="226" ry="226" fill="none" stroke="#1f1f1f" stroke-width="2"/>

  <!-- Volleyball, centered -->
  <g transform="translate(512 512)">
    <!-- Ball body -->
    <circle r="376" fill="#FCD34D"/>

    <!-- Soft top highlight for depth (very subtle) -->
    <ellipse cx="-110" cy="-150" rx="160" ry="80" fill="#FFE99B" opacity="0.55"/>

    <!-- 3 panel-edge curves at 0° / 120° / 240°.
         Each path is an S-shape from north pole to south pole;
         rotating by 120° gives the classic 6-panel volleyball look. -->
    <g fill="none" stroke="#111111" stroke-width="44" stroke-linecap="round">
      <path d="M 0 -376 C 220 -210, 220 210, 0 376"/>
      <path d="M 0 -376 C 220 -210, 220 210, 0 376" transform="rotate(120)"/>
      <path d="M 0 -376 C 220 -210, 220 210, 0 376" transform="rotate(240)"/>
    </g>

    <!-- Single accent dot (orange — nod to AVP reference) -->
    <circle cx="180" cy="-180" r="20" fill="#F97316" opacity="0"/>
  </g>
</svg>
