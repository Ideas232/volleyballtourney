<!DOCTYPE html>
<html lang="en" style="color-scheme: light;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Bay Vball — dense</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  scrollbar-width: none;
  -ms-overflow-style: none;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: none;
}
html::-webkit-scrollbar,
body::-webkit-scrollbar { display: none; width: 0; height: 0; }

button, .day-cell, .ev-chip, .tag, .nav-btn, .bookmark-btn, .sheet-close, .event {
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

:root {
  /* 2pt base spacing scale */
  --s1: 2px;  --s2: 4px;  --s3: 6px;  --s4: 8px;
  --s5: 12px; --s6: 14px; --s7: 16px; --s8: 20px;
  --s9: 24px; --s10: 32px;

  /* Type scale — readable, modular ~1.18 */
  --t12: 12px; --t13: 13px; --t14: 14px; --t15: 15px;
  --t16: 16px; --t17: 17px; --t18: 18px; --t20: 20px;
  --t22: 22px; --t26: 26px; --t42: 42px;

  --serif: 'Crimson Pro', Georgia, ui-serif, serif;
  --sans:  'Inter', -apple-system, system-ui, sans-serif;

  --bg: #ffffff;
  --ink: #000000;
  --ink-soft: rgba(0, 0, 0, 0.72);
  --muted: rgba(0, 0, 0, 0.42);
  --line: rgba(0, 0, 0, 0.10);
  --accent: #1a1a1a;
  --accent-tint: rgba(0, 0, 0, 0.05);
  --accent-bg: rgba(0, 0, 0, 0.03);
}

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "kern" 1, "liga" 1, "ss01" 1;
  min-height: 100vh;
}

body { width: 100%; max-width: 420px; margin: 0 auto; }

/* ============================== Masthead ============================== */
.masthead {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: var(--s7) var(--s6) var(--s4);
}
.masthead .month-block { line-height: 1; }
.masthead .month {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  font-size: var(--t42);
  letter-spacing: -0.02em;
  color: var(--ink);
}
.masthead .year {
  font-family: var(--serif);
  font-weight: 400;
  font-size: var(--t16);
  color: var(--muted);
  margin-left: var(--s2);
  vertical-align: 0.55em;
}
.masthead .subtitle {
  font-family: var(--sans);
  font-weight: 400;
  font-size: var(--t14);
  color: var(--ink-soft);
  margin-top: var(--s3);
}
.masthead .subtitle[data-live="1"]::after {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #16a34a;
  margin-left: 6px;
  vertical-align: 1px;
}

.masthead .nav { display: flex; gap: var(--s2); margin-top: -2px; }
.nav-btn {
  width: 44px; height: 44px;
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: var(--serif);
  font-size: 32px;
  line-height: 1;
  border-radius: 50%;
  cursor: pointer;
  display: grid; place-items: center;
  transition: all 0.15s ease;
}
.nav-btn:hover { color: var(--ink); background: var(--accent-tint); }

/* ============================== Calendar ============================== */
.calendar {
  padding: 0 var(--s4) var(--s5);
  touch-action: pan-y;
  will-change: transform;
}

.day-labels {
  display: grid;
  grid-template-columns: 0.7fr 0.7fr 0.7fr 0.7fr 0.7fr 1.8fr 1.8fr;
  text-align: center;
  font-family: var(--sans);
  font-size: var(--t13);
  font-weight: 400;
  color: var(--muted);
  padding: 0 var(--s2) var(--s4);
}
.day-labels .wknd { color: var(--ink); font-weight: 500; }
.day-labels .wkdy { font-size: var(--t12); }

.grid-days {
  display: grid;
  grid-template-columns: 0.7fr 0.7fr 0.7fr 0.7fr 0.7fr 1.8fr 1.8fr;
  grid-auto-rows: 102px;
  grid-template-rows: repeat(4, 102px) 38px;
}

.day-cell {
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 10px 4px 6px;
  position: relative;
  border: none; background: transparent;
  font-family: var(--serif);
  font-size: var(--t20);
  color: var(--ink);
  cursor: pointer;
  transition: background 0.15s ease;
}
.day-cell.wkdy {
  font-size: var(--t15);
  color: var(--muted);
}
.day-cell.wkdy .day-num { font-weight: 400; }
.day-cell.wkdy.today .day-num { font-weight: 700; color: var(--ink); }
.day-cell:hover { background: rgba(0, 0, 0, 0.025); }
.day-cell:disabled { opacity: 0.3; cursor: default; }
.day-num {
  position: relative; z-index: 1;
  line-height: 1;
  transition: color 0.15s ease;
  font-weight: 400;
}

.day-cell.today .day-num {
  font-weight: 700;
  color: var(--ink);
}

.day-cell.selected .day-num {
  font-weight: 700;
}
.day-cell.selected .ev-chip {
  background: rgba(0, 0, 0, 0.08);
}

.evs {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: stretch;
  gap: 3px;
  margin-top: 10px;
  width: 100%;
}
.ev-chip {
  font-family: var(--sans);
  font-size: 12px;
  line-height: 1.35;
  font-weight: 400;
  background: var(--accent-tint);
  color: var(--ink-soft);
  border-radius: 3px;
  padding: 2px 6px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.ev-chip .fmt { font-weight: 500; color: var(--ink); }
.ev-chip .surf { font-weight: 400; color: var(--muted); }

/* ============================== Section ============================== */
.section-label {
  padding: var(--s8) var(--s7) var(--s4);
  font-family: var(--serif);
  font-weight: 400;
  font-size: var(--t22);
  color: var(--ink);
}

/* ============================== Event cards ============================== */
.events {
  padding: var(--s7) var(--s4) 0;
  display: flex;
  flex-direction: column;
  gap: var(--s3);
}

.event {
  position: relative;
  padding: var(--s7) var(--s8);
  background: #f4f4f4;
  border-radius: 32px;
  cursor: pointer;
  transition: background 0.18s ease;
}
.event:hover { background: #ececec; }
.event.flash {
  animation: eventFlash 1.4s ease;
}
@keyframes eventFlash {
  0%, 25% { background: #e4e4e4; box-shadow: 0 0 0 2px rgba(0,0,0,0.10); }
  100% { background: #f4f4f4; box-shadow: 0 0 0 0 rgba(0,0,0,0); }
}

.day-heading {
  font-family: var(--sans);
  font-size: var(--t16);
  font-weight: 500;
  color: var(--ink);
  padding: var(--s7) var(--s4) var(--s2);
}
.day-heading:first-child { padding-top: var(--s2); }
.day-tag {
  font-family: var(--sans);
  font-size: var(--t16);
  font-weight: 500;
  color: var(--ink);
}
.bookmark-btn {
  position: absolute;
  top: var(--s5);
  right: var(--s5);
  width: 40px; height: 40px;
  background: transparent;
  border: none;
  color: var(--ink-soft);
  border-radius: 50%;
  display: grid; place-items: center;
  cursor: pointer;
  transition: all 0.15s;
}
.bookmark-btn:hover {
  color: var(--ink);
  background: rgba(0, 0, 0, 0.06);
}

.event-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: var(--t22);
  line-height: 1.2;
  color: var(--ink);
  padding-right: 36px;
}
.event-title .multi {
  font-weight: 400;
  color: var(--muted);
  font-size: var(--t18);
}

.event-meta {
  font-family: var(--sans);
  font-size: var(--t14);
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.4;
}
.event-meta .roman { color: var(--ink-soft); }

.event-foot {
  display: flex; align-items: center; gap: var(--s3);
  margin-top: var(--s4);
}
.tags { display: inline-flex; flex-wrap: wrap; gap: 5px; flex: 1; align-items: center; }
.tag {
  padding: 3px 8px;
  font-family: var(--sans);
  font-size: var(--t12);
  font-weight: 400;
  color: var(--ink-soft);
  background: #ffffff;
  border-radius: 4px;
  line-height: 1.4;
}
.tag.deadline {
  background: transparent;
  color: var(--accent);
  font-weight: 500;
  font-size: var(--t13);
  padding: 0;
}
.via {
  font-family: var(--sans);
  font-size: var(--t13);
  font-weight: 400;
  color: var(--muted);
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 3px;
  flex-shrink: 0;
}
.event:hover .via { color: var(--ink-soft); }
.via .arrow { transition: transform 0.18s ease; font-style: normal; }
.event:hover .via .arrow { transform: translateX(2px); }

/* ============================== Footer ============================== */
.page-foot {
  margin-top: var(--s9);
  padding: var(--s5) var(--s7) var(--s8);
  font-family: var(--sans);
  font-size: var(--t13);
  color: var(--muted);
  line-height: 1.55;
}
.page-foot .wordmark {
  font-family: var(--sans);
  font-weight: 600;
  font-size: var(--t14);
  color: var(--ink);
  margin-right: var(--s3);
}
.page-foot a {
  color: var(--ink-soft);
  text-decoration: underline;
  text-underline-offset: 2px;
  text-decoration-thickness: 0.5px;
  text-decoration-color: var(--line);
}
.page-foot a:hover { text-decoration-color: var(--ink); }

/* ============================== Detail Sheet ============================== */
.scrim {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.32);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
  z-index: 50;
}
.scrim.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  left: 50%;
  bottom: 0;
  transform: translate(-50%, 100%);
  width: 420px;
  max-width: 100vw;
  max-height: 88vh;
  background: var(--bg);
  border-radius: 28px 28px 0 0;
  z-index: 51;
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.12);
}
.sheet.open { transform: translate(-50%, 0); }

.sheet .handle {
  width: 36px; height: 4px;
  background: rgba(0, 0, 0, 0.18);
  border-radius: 2px;
  margin: var(--s4) auto var(--s2);
  flex-shrink: 0;
}

.sheet .body {
  padding: var(--s7) var(--s8) var(--s5);
  overflow-y: auto;
  flex: 1;
}

.sheet .day-tag {
  font-family: var(--sans);
  font-size: var(--t17);
  color: var(--ink);
  font-weight: 600;
  margin-bottom: var(--s4);
  letter-spacing: -0.005em;
}

.sheet h2 {
  font-family: var(--serif);
  font-weight: 500;
  font-size: var(--t26);
  line-height: 1.15;
  color: var(--ink);
  margin-bottom: var(--s4);
}
.sheet h2 .multi {
  font-weight: 400;
  color: var(--muted);
  font-size: var(--t20);
  display: block;
  margin-top: 2px;
}

.sheet .venue {
  font-family: var(--sans);
  font-size: var(--t15);
  color: var(--ink-soft);
  margin-bottom: var(--s7);
  line-height: 1.45;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 0.5px;
  text-decoration-color: rgba(0, 0, 0, 0.25);
  display: inline-block;
}
.sheet .venue:hover { text-decoration-color: var(--ink); color: var(--ink); }
.sheet .venue .city { color: var(--muted); }

.sheet .description {
  font-family: var(--sans);
  font-size: var(--t14);
  color: var(--ink-soft);
  line-height: 1.55;
  margin-bottom: var(--s7);
  white-space: pre-line;
  -webkit-user-select: text;
  user-select: text;
}
.sheet .description:empty { display: none; }

.sheet .stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--s4) var(--s7);
  padding: var(--s5) 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  margin-bottom: var(--s7);
}
.sheet .stat .k {
  font-family: var(--sans);
  font-size: var(--t12);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 2px;
}
.sheet .stat .v {
  font-family: var(--sans);
  font-size: var(--t15);
  font-weight: 500;
  color: var(--ink);
}
.sheet .stat .v.deadline { color: var(--ink); }

.sheet .divisions-label {
  font-family: var(--sans);
  font-size: var(--t12);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: var(--s4);
}
.sheet .divisions {
  display: flex; flex-wrap: wrap; gap: var(--s2);
  margin-bottom: var(--s8);
}
.sheet .divisions .tag {
  background: #f4f4f4;
  padding: 5px 10px;
  font-size: var(--t13);
  border-radius: 5px;
  color: var(--ink-soft);
}

.sheet .actions {
  padding: var(--s5) var(--s8) calc(var(--s8) + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  gap: var(--s3);
  border-top: 1px solid var(--line);
  background: var(--bg);
  flex-shrink: 0;
}
.btn {
  display: flex; align-items: center; justify-content: center;
  gap: var(--s3);
  height: 48px;
  border-radius: 14px;
  font-family: var(--sans);
  font-size: var(--t15);
  font-weight: 500;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s ease;
}
.btn.primary {
  background: var(--ink);
  color: var(--bg);
}
.btn.primary:hover { background: rgba(0, 0, 0, 0.82); }
.btn.secondary {
  background: transparent;
  color: var(--ink-soft);
  height: 44px;
  font-size: var(--t14);
}
.btn.secondary:hover { color: var(--ink); }
.btn[aria-disabled="true"] { opacity: 0.4; pointer-events: none; }
.btn.secondary[disabled] { opacity: 0.4; pointer-events: none; }

.sheet-close {
  position: absolute;
  top: var(--s5);
  right: var(--s5);
  width: 44px; height: 44px;
  border: none;
  background: rgba(0, 0, 0, 0.06);
  color: var(--ink-soft);
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  border-radius: 50%;
  display: grid; place-items: center;
  transition: all 0.15s ease;
}
.sheet-close:hover { color: var(--ink); background: rgba(0, 0, 0, 0.10); }

@keyframes monthSlideRight {
  from { opacity: 0; transform: translateX(18px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes monthSlideLeft {
  from { opacity: 0; transform: translateX(-18px); }
  to   { opacity: 1; transform: translateX(0); }
}
.calendar.slide-right { animation: monthSlideRight 0.22s ease; }
.calendar.slide-left  { animation: monthSlideLeft  0.22s ease; }
</style>
</head>
<body>

<header class="masthead">
  <div>
    <div class="month-block">
      <span class="month"></span><span class="year"></span>
    </div>
    <div class="subtitle">Loading…</div>
  </div>
  <div class="nav">
    <button class="nav-btn" aria-label="Previous">‹</button>
    <button class="nav-btn" aria-label="Next">›</button>
  </div>
</header>

<section class="calendar">
  <div class="day-labels">
    <span class="wkdy">Mon</span><span class="wkdy">Tue</span><span class="wkdy">Wed</span><span class="wkdy">Thu</span><span class="wkdy">Fri</span><span class="wknd">Sat</span><span class="wknd">Sun</span>
  </div>
  <div class="grid-days"></div>
</section>

<div class="events"></div>

<footer class="page-foot">
  <span class="wordmark">Bay Vball</span>
  Bay Area volleyball tournaments. Sources:
  <a href="#">NAGVA</a>, <a href="#">TL Sports</a>, <a href="#">FVBL</a>. Updated daily.
</footer>

<div class="scrim" aria-hidden="true"></div>
<aside class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title" aria-hidden="true">
  <div class="handle" aria-hidden="true"></div>
  <button class="sheet-close" aria-label="Close">×</button>
  <div class="body">
    <div class="day-tag" data-day></div>
    <h2 id="sheet-title" data-title></h2>
    <a class="venue" target="_blank" rel="noopener">
      <span data-venue></span><span data-city-sep> · </span><span class="city" data-city></span>
    </a>
    <div class="description" data-description></div>
    <div class="stats">
      <div class="stat">
        <div class="k">Format</div>
        <div class="v" data-format></div>
      </div>
      <div class="stat">
        <div class="k">Fee</div>
        <div class="v" data-fee></div>
      </div>
      <div class="stat">
        <div class="k">Deadline</div>
        <div class="v" data-deadline></div>
      </div>
      <div class="stat">
        <div class="k">Source</div>
        <div class="v" data-source></div>
      </div>
    </div>
    <div class="divisions-label">Divisions</div>
    <div class="divisions" data-divisions></div>
  </div>
  <div class="actions">
    <a class="btn primary" data-source-btn target="_blank" rel="noopener" aria-disabled="true" tabindex="-1">Registration unavailable</a>
    <button class="btn secondary" data-add-cal>Add to calendar</button>
  </div>
</aside>

<script>
(function() {
  // ============ DATA ============
  // No bundled fallback — all events come from data/events.json.
  let EVENTS = [];
  // Map of event.id → original (rich) event object, for sheet description + ICS export
  const RAW_BY_ID = new Map();

  const SHEET = document.querySelector('.sheet');
  const SCRIM = document.querySelector('.scrim');
  const TODAY = new Date(2026, 5, 13); // pinned for prototype
  let cur = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);

  // ============ HELPERS ============
  const parseISO = (s) => s ? new Date(s + 'T00:00:00') : null;
  const escapeHTML = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const mapsURL = (venue, city) =>
    'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(`${venue}, ${city}`);

  function fmtDayTag(d) {
    return d.toLocaleDateString('en-US', { weekday:'short' }) + ' · ' +
           d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  }

  function fmtMonShortDay(d) {
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  }

  // ============ RENDER ============
  function render() {
    const y = cur.getFullYear(), m = cur.getMonth();
    const monthName = cur.toLocaleDateString('en-US', { month:'long' });

    // Group events that touch this month, by day-of-month
    const eventsByDay = {};
    EVENTS.forEach(ev => {
      const start = parseISO(ev.date);
      if (!start) return;
      const end = ev.endDate ? (parseISO(ev.endDate) || start) : start;
      for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
        if (d.getFullYear() === y && d.getMonth() === m) {
          const day = d.getDate();
          (eventsByDay[day] = eventsByDay[day] || []).push(ev);
        }
      }
    });
    const uniqIds = new Set();
    Object.values(eventsByDay).flat().forEach(e => uniqIds.add(e.id));
    const count = uniqIds.size;

    // Masthead
    document.querySelector('.masthead .month').textContent = monthName;
    document.querySelector('.masthead .year').textContent = y;
    document.querySelector('.masthead .subtitle').textContent =
      count === 0 ? 'No tournaments yet' :
      count === 1 ? '1 tournament' : count + ' tournaments';

    // Calendar grid — render only the rows this month needs.
    // Rows are 102px; the very last row shrinks to 38px when it has no events
    // (avoids a 102px void of trailing pads / weekday-only cells without
    // collapsing whole sparse months).
    const first = new Date(y, m, 1);
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const leadPad = (first.getDay() + 6) % 7; // Mon=0..Sun=6
    const ROWS = Math.ceil((leadPad + daysInMonth) / 7);

    let lastRowHasEvents = false;
    const lastRowStart = (ROWS - 1) * 7;
    for (let i = lastRowStart; i < ROWS * 7; i++) {
      const d = i - leadPad + 1;
      if (d >= 1 && d <= daysInMonth && eventsByDay[d]) { lastRowHasEvents = true; break; }
    }
    const rowHeights = new Array(ROWS).fill('102px');
    if (!lastRowHasEvents) rowHeights[ROWS - 1] = '38px';

    const grid = document.querySelector('.grid-days');
    grid.style.gridTemplateRows = rowHeights.join(' ');
    grid.innerHTML = '';

    const isThisMonth = TODAY.getFullYear() === y && TODAY.getMonth() === m;
    for (let i = 0; i < ROWS*7; i++) {
      const col = i % 7;
      const isWknd = col >= 5;
      const dayNum = i - leadPad + 1;
      const inMonth = dayNum >= 1 && dayNum <= daysInMonth;

      const btn = document.createElement('button');
      btn.className = 'day-cell' + (isWknd ? '' : ' wkdy');
      if (!inMonth) {
        btn.disabled = true;
      } else {
        const num = document.createElement('span');
        num.className = 'day-num';
        num.textContent = dayNum;
        btn.appendChild(num);
        if (isThisMonth && dayNum === TODAY.getDate()) btn.classList.add('today');

        const dayEvs = eventsByDay[dayNum];
        if (dayEvs) {
          const evsDiv = document.createElement('div');
          evsDiv.className = 'evs';
          dayEvs.forEach(ev => {
            const rawFmt = ev.format || '';
            const [fmt, surf] = rawFmt.split('·').map(s => s.trim());
            if (!fmt && !surf) return; // skip empty chip
            const chip = document.createElement('span');
            chip.className = 'ev-chip';
            chip.innerHTML = '<span class="fmt">' + escapeHTML(fmt) + '</span>' +
                             (surf ? '<span class="surf">' + escapeHTML(surf) + '</span>' : '');
            evsDiv.appendChild(chip);
          });
          btn.appendChild(evsDiv);
        }
      }
      grid.appendChild(btn);
    }

    // Upcoming list
    const seen = new Set();
    const list = [];
    EVENTS.forEach(ev => {
      if (seen.has(ev.id)) return;
      const start = parseISO(ev.date);
      if (!start) return;
      const end = ev.endDate ? (parseISO(ev.endDate) || start) : start;
      const monStart = new Date(y, m, 1), monEnd = new Date(y, m+1, 0, 23,59,59);
      if (end >= monStart && start <= monEnd) {
        seen.add(ev.id); list.push(ev);
      }
    });
    list.sort((a,b) => a.date.localeCompare(b.date));

    const container = document.querySelector('.events');
    container.innerHTML = '';
    if (list.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:32px 24px;text-align:center;color:var(--muted);font-family:var(--sans);font-size:14px';
      empty.textContent = 'No tournaments scheduled.';
      container.appendChild(empty);
      return;
    }

    let lastDayLabel = null;
    list.forEach(ev => {
      const start = parseISO(ev.date);
      const dayLabel = fmtDayTag(start);
      let multi = '';
      if (ev.endDate && ev.endDate !== ev.date) {
        const end = parseISO(ev.endDate);
        if (end) multi = ` <span class="multi">(through ${fmtMonShortDay(end)})</span>`;
      }
      // Build the format-tag preserving surface inline (so the tag reads
      // "4s indoor · $180" rather than "4s · $180" — surface is the
      // important glanceable distinguisher). Skip halves that are missing.
      const [_fmt, _surf] = (ev.format || '').split('·').map(s => s.trim());
      const fmtCombined = _surf ? (_fmt + ' ' + _surf) : _fmt;
      const fmtParts = [];
      if (fmtCombined) fmtParts.push(fmtCombined);
      if (ev.fee && ev.fee !== '—') fmtParts.push(ev.fee);
      const fmtTag = fmtParts.join(' · ');

      const tagsHTML =
        (ev.divisions || []).map(d => `<span class="tag">${escapeHTML(d)}</span>`).join('') +
        (fmtTag ? `<span class="tag">${escapeHTML(fmtTag)}</span>` : '') +
        (ev.deadline ? `<span class="tag deadline">${escapeHTML(ev.deadline)}</span>` : '');

      // For data-day on the article, use the start date if it falls in this month;
      // otherwise the first day this event is visible in this month.
      let articleDay = start.getDate();
      if (start.getFullYear() !== y || start.getMonth() !== m) {
        articleDay = 1; // event started before this month — anchor to day 1
      }

      const article = document.createElement('article');
      article.className = 'event';
      article.dataset.id = ev.id;
      article.dataset.day = articleDay;
      article.dataset.dayLabel = dayLabel;
      article.dataset.venue = ev.venue || '';
      article.dataset.city = ev.city || '';
      article.dataset.format = ev.format || '';
      article.dataset.fee = ev.fee || '';
      article.dataset.source = ev.source || '';
      article.dataset.divisions = JSON.stringify(ev.divisions || []);
      if (ev.deadline) article.dataset.deadline = ev.deadline;
      if (ev.description) article.dataset.description = ev.description;
      if (ev.registrationUrl) article.dataset.registrationUrl = ev.registrationUrl;

      const venueHTML = ev.venue
        ? `<span class="roman">${escapeHTML(ev.venue)}</span>${ev.city ? ' · ' + escapeHTML(ev.city) : ''}`
        : (ev.city ? escapeHTML(ev.city) : 'Venue TBD');
      const viaHTML = ev.source
        ? `via ${escapeHTML(ev.source)} <span class="arrow">→</span>`
        : `<span class="arrow">→</span>`;

      article.innerHTML = `
        <button class="bookmark-btn" aria-label="Add to calendar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3.5" y="5" width="17" height="15.5" rx="1.5"/>
            <line x1="3.5" y1="9" x2="20.5" y2="9"/>
            <line x1="8" y1="3" x2="8" y2="6.5"/>
            <line x1="16" y1="3" x2="16" y2="6.5"/>
            <line x1="12" y1="12.5" x2="12" y2="17.5"/>
            <line x1="9.5" y1="15" x2="14.5" y2="15"/>
          </svg>
        </button>
        <h3 class="event-title">${escapeHTML(ev.title || 'Untitled tournament')}${multi}</h3>
        <p class="event-meta">${venueHTML}</p>
        <div class="event-foot">
          <div class="tags">${tagsHTML}</div>
          <span class="via">${viaHTML}</span>
        </div>
      `;
      if (dayLabel !== lastDayLabel) {
        const heading = document.createElement('div');
        heading.className = 'day-heading';
        heading.textContent = dayLabel;
        container.appendChild(heading);
        lastDayLabel = dayLabel;
      }
      container.appendChild(article);
    });
  }

  let isAnimating = false;
  function commitSwipe(dir) {
    if (isAnimating) return;
    isAnimating = true;
    const cal = document.querySelector('.calendar');
    const W = cal.offsetWidth;
    cal.style.transition = 'transform 0.22s ease, opacity 0.18s ease';
    cal.style.transform = 'translateX(' + (dir > 0 ? -W : W) + 'px)';
    cal.style.opacity = '0';
    setTimeout(() => {
      cur = new Date(cur.getFullYear(), cur.getMonth() + dir, 1);
      render();
      cal.style.transition = 'none';
      cal.style.transform = 'translateX(' + (dir > 0 ? W : -W) + 'px)';
      cal.style.opacity = '0';
      requestAnimationFrame(() => {
        cal.style.transition = 'transform 0.26s cubic-bezier(0.32,0.72,0,1), opacity 0.22s ease';
        cal.style.transform = 'translateX(0)';
        cal.style.opacity = '1';
        setTimeout(() => { isAnimating = false; }, 280);
      });
    }, 220);
  }

  function snapBack() {
    const cal = document.querySelector('.calendar');
    cal.style.transition = 'transform 0.24s cubic-bezier(0.32,0.72,0,1), opacity 0.18s ease';
    cal.style.transform = 'translateX(0)';
    cal.style.opacity = '1';
  }

  // ============ SHEET ============
  function openSheet(eventEl) {
    const day = eventEl.dataset.dayLabel || (eventEl.querySelector('.day-tag') && eventEl.querySelector('.day-tag').textContent) || '';
    const titleEl = eventEl.querySelector('.event-title');
    const venue = eventEl.dataset.venue || '';
    const city = eventEl.dataset.city || '';
    const format = eventEl.dataset.format || '—';
    const fee = eventEl.dataset.fee || '—';
    const deadline = eventEl.dataset.deadline || '—';
    const source = eventEl.dataset.source || '';
    let divisions = [];
    try { divisions = JSON.parse(eventEl.dataset.divisions || '[]'); }
    catch (_) { divisions = []; }

    SHEET.querySelector('[data-day]').textContent = day;
    SHEET.querySelector('[data-title]').innerHTML = titleEl ? titleEl.innerHTML : '';
    SHEET.querySelector('[data-venue]').textContent = venue || 'Venue TBD';
    SHEET.querySelector('[data-city]').textContent = city || '';
    const sep = SHEET.querySelector('[data-city-sep]');
    if (sep) sep.style.display = (venue && city) ? '' : 'none';
    const venueLink = SHEET.querySelector('.venue');
    if (venue || city) {
      venueLink.setAttribute('href', mapsURL(venue || '', city || ''));
    } else {
      venueLink.removeAttribute('href');
    }
    SHEET.querySelector('[data-format]').textContent = format || '—';
    SHEET.querySelector('[data-fee]').textContent = fee || '—';
    SHEET.querySelector('[data-deadline]').textContent = deadline || '—';
    SHEET.querySelector('[data-source]').textContent = source || '—';

    const regUrl = eventEl.dataset.registrationUrl || '';
    const regBtn = SHEET.querySelector('[data-source-btn]');
    if (regUrl) {
      regBtn.setAttribute('href', regUrl);
      regBtn.removeAttribute('aria-disabled');
      regBtn.removeAttribute('tabindex');
      regBtn.textContent = source ? `Register on ${source}` : 'Register';
    } else {
      regBtn.removeAttribute('href');
      regBtn.setAttribute('aria-disabled', 'true');
      regBtn.setAttribute('tabindex', '-1');
      regBtn.textContent = 'Registration unavailable';
    }

    const descEl = SHEET.querySelector('[data-description]');
    descEl.textContent = eventEl.dataset.description || '';

    SHEET.dataset.eventId = eventEl.dataset.id || '';

    const addCalBtn = SHEET.querySelector('[data-add-cal]');
    if (addCalBtn) {
      const hasId = !!eventEl.dataset.id;
      addCalBtn.disabled = !hasId;
      addCalBtn.style.opacity = hasId ? '1' : '0.4';
    }

    const divEl = SHEET.querySelector('[data-divisions]');
    divEl.innerHTML = '';
    divisions.forEach(d => {
      const span = document.createElement('span');
      span.className = 'tag';
      span.textContent = d;
      divEl.appendChild(span);
    });

    SCRIM.classList.add('open');
    SHEET.classList.add('open');
    SHEET.setAttribute('aria-hidden','false');
    document.body.style.overflow = 'hidden';
  }
  function closeSheet() {
    SCRIM.classList.remove('open');
    SHEET.classList.remove('open');
    SHEET.setAttribute('aria-hidden','true');
    document.body.style.overflow = '';
  }

  // ============ ICS Export ============
  function icsEscape(s) { return String(s).replace(/([\\,;])/g, '\\$1').replace(/\n/g, '\\n'); }
  function fmtDate(iso) { return iso.replace(/-/g, ''); }
  function nextDay(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    const date = new Date(Date.UTC(y, (m || 1) - 1, d));
    date.setUTCDate(date.getUTCDate() + 1);
    return date.toISOString().slice(0, 10).replace(/-/g, '');
  }
  function fmtStamp() {
    const d = new Date();
    const p = (n) => String(n).padStart(2, '0');
    return d.getUTCFullYear() + p(d.getUTCMonth()+1) + p(d.getUTCDate()) +
           'T' + p(d.getUTCHours()) + p(d.getUTCMinutes()) + p(d.getUTCSeconds()) + 'Z';
  }
  function buildIcs(ev) {
    if (!ev || !ev.startDate) return null;
    const dtStart = fmtDate(ev.startDate);
    const dtEnd = nextDay(ev.endDate || ev.startDate);
    const loc = [ev.location && ev.location.venue, ev.location && ev.location.city, ev.location && ev.location.state]
      .filter(Boolean).join(', ');
    const descParts = [
      (ev.divisions || []).join(', '),
      ev.format ? 'Format: ' + ev.format + (ev.surface ? ' (' + ev.surface + ')' : '') : null,
      ev.feeUSD != null && ev.feeUSD !== '' ? 'Entry: $' + ev.feeUSD : null,
      ev.registrationDeadline ? 'Register by: ' + ev.registrationDeadline : null,
      ev.description || ev.notes,
      ev.registrationUrl || ev.sourceUrl,
    ].filter(Boolean);
    const lines = [
      'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Bay Vball//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH',
      'BEGIN:VEVENT',
      'UID:' + ev.id + '@bay-vball',
      'DTSTAMP:' + fmtStamp(),
      'DTSTART;VALUE=DATE:' + dtStart,
      'DTEND;VALUE=DATE:' + dtEnd,
      'SUMMARY:' + icsEscape(ev.name || ev.title || 'Volleyball tournament'),
      loc ? 'LOCATION:' + icsEscape(loc) : null,
      descParts.length ? 'DESCRIPTION:' + icsEscape(descParts.join('\n')) : null,
      ev.sourceUrl ? 'URL:' + ev.sourceUrl : null,
      'END:VEVENT','END:VCALENDAR',
    ].filter(Boolean);
    return lines.join('\r\n');
  }
  function downloadIcs(ev) {
    if (!ev) return;
    const ics = buildIcs(ev);
    if (!ics) return;
    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const safeName = (ev.name || ev.title || 'event').replace(/[^a-z0-9]+/gi, '-').toLowerCase();
    a.download = (safeName || 'event') + '.ics';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 100);
  }

  // ============ DELEGATED HANDLERS ============
  document.querySelector('.events').addEventListener('click', (e) => {
    const ev = e.target.closest('.event');
    if (!ev) return;
    if (e.target.closest('.bookmark-btn')) {
      e.stopPropagation();
      const id = ev.dataset.id;
      const raw = id && RAW_BY_ID.get(id);
      if (raw) downloadIcs(raw);
      return;
    }
    openSheet(ev);
  });

  document.querySelector('.grid-days').addEventListener('click', (e) => {
    const cell = e.target.closest('.day-cell');
    if (!cell || cell.disabled) return;
    const numEl = cell.querySelector('.day-num');
    if (!numEl) return;
    const day = parseInt(numEl.textContent, 10);
    if (!Number.isFinite(day)) return;

    document.querySelectorAll('.day-cell.selected').forEach(c => c.classList.remove('selected'));
    cell.classList.add('selected');

    const articles = [...document.querySelectorAll('.event[data-day]')];
    if (articles.length === 0) return;
    const target = articles.find(a => parseInt(a.dataset.day, 10) >= day) || articles[articles.length - 1];
    if (!target) return;
    const top = target.getBoundingClientRect().top + window.scrollY - 12;
    window.scrollTo({ top, behavior: 'smooth' });
    target.classList.remove('flash');
    void target.offsetWidth;
    target.classList.add('flash');
  });

  // Prev / Next
  const navBtns = document.querySelectorAll('.nav-btn');
  navBtns[0].addEventListener('click', () => commitSwipe(-1));
  navBtns[1].addEventListener('click', () => commitSwipe(1));

  // Swipe — direction-locked, follow-finger
  const calEl = document.querySelector('.calendar');
  let sx = null, sy = null, dx = 0, locked = null;
  calEl.addEventListener('touchstart', (e) => {
    if (isAnimating) return;
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    dx = 0; locked = null;
    calEl.style.transition = 'none';
  }, { passive: true });
  calEl.addEventListener('touchmove', (e) => {
    if (sx == null) return;
    const t = e.touches[0];
    const ddx = t.clientX - sx, ddy = t.clientY - sy;
    if (locked == null) {
      if (Math.abs(ddx) > 8 || Math.abs(ddy) > 8) {
        locked = Math.abs(ddx) > Math.abs(ddy) ? 'x' : 'y';
      }
    }
    if (locked === 'x') {
      dx = ddx;
      calEl.style.transform = 'translateX(' + dx + 'px)';
      calEl.style.opacity = String(1 - Math.min(Math.abs(dx) / 600, 0.35));
    }
  }, { passive: true });
  calEl.addEventListener('touchend', () => {
    if (sx == null) return;
    if (locked === 'x') {
      if (Math.abs(dx) > 60) {
        commitSwipe(dx < 0 ? 1 : -1);
      } else {
        snapBack();
      }
    }
    sx = sy = null; locked = null;
  }, { passive: true });

  SCRIM.addEventListener('click', closeSheet);
  document.querySelector('.sheet-close').addEventListener('click', closeSheet);
  document.querySelector('[data-add-cal]').addEventListener('click', () => {
    const id = SHEET.dataset.eventId;
    const raw = id && RAW_BY_ID.get(id);
    if (raw) downloadIcs(raw);
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSheet(); });

  // Initial render (overrides static markup with bundled fallback)
  render();

  // Fetch live curated data; replace EVENTS and re-render on success.
  // The shape on disk follows the React `Event` type — transform to the
  // flat shape the prototype uses internally.
  const SOURCE_NAMES = { nagva: 'NAGVA', tlsports: 'The League Sports', fvbl: 'FVBL', revco: 'Revco', sfdynasty: 'SF Dynasty', noattitudes: 'No Attitudes' };
  function transformLive(e) {
    const fmt = e.format || '';
    const surf = e.surface || '';
    const formatStr = fmt && surf ? fmt + ' · ' + surf : (fmt || surf || '');
    const fee = (e.feeUSD != null && e.feeUSD !== '') ? '$' + e.feeUSD : '—';
    let deadline = null;
    if (e.registrationDeadline) {
      const d = parseISO(e.registrationDeadline);
      const now = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
      if (d) {
        const days = Math.round((d - now) / 86400000);
        if (days >= 0 && days <= 14) {
          deadline = days === 0 ? 'register today' : 'register in ' + days + ' day' + (days === 1 ? '' : 's');
        }
      }
    }
    return {
      id: e.id,
      date: e.startDate,
      endDate: e.endDate,
      title: e.name,
      venue: (e.location && e.location.venue) || '',
      city: (e.location && e.location.city) || '',
      format: formatStr,
      fee,
      divisions: e.divisions || [],
      deadline,
      source: SOURCE_NAMES[e.source] || e.source || '',
      description: e.description || e.notes || '',
      registrationUrl: e.registrationUrl || e.sourceUrl || '',
    };
  }

  fetch('data/events.json', { cache: 'no-store' })
    .then(r => {
      console.log('[events] fetch status:', r.status);
      return r.ok ? r.json() : Promise.reject(r.status);
    })
    .then(data => {
      if (data && Array.isArray(data.events) && data.events.length > 0) {
        EVENTS = data.events.map(transformLive);
        RAW_BY_ID.clear();
        data.events.forEach(e => RAW_BY_ID.set(e.id, e));
        console.log('[events] loaded ' + EVENTS.length + ' events from data/events.json');
        const sub = document.querySelector('.masthead .subtitle');
        if (sub) sub.dataset.live = '1';
        render();
      } else {
        console.warn('[events] empty or malformed events.json — keeping bundled fallback');
      }
    })
    .catch((err) => {
      console.warn('[events] fetch failed:', err, '— keeping bundled fallback');
    });
})();
</script>

</body>
</html>
